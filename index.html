<!DOCTYPE html>
<html>
<head>

<title>ZEL ADMIN</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" href="https://gcdnb.pbrd.co/images/Uv3k5C3kVSGE.png?o=1">

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;

background-image:url("https://gcdnb.pbrd.co/images/uDUCtj0uT4Nr.png?o=1");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.overlay{
background:rgba(0,0,0,0.65);
min-height:100vh;
padding-top:70px;
}

/* animasi muncul */
@keyframes fadeUp{
0%{
opacity:0;
transform:translateY(30px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

/* profil */
.profile{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
border:4px solid #25D366;
box-shadow:0 0 20px rgba(0,0,0,0.6);
animation:fadeUp 0.8s ease;
}

/* nama */
h1{
margin:20px 0 40px;
font-size:28px;
letter-spacing:1px;
animation:fadeUp 1s ease;
}

/* tombol */
.btn{
display:block;
width:260px;
margin:18px auto;
padding:16px;
border-radius:14px;
text-decoration:none;
background:#25D366;
color:white;
font-size:18px;
font-weight:bold;
box-shadow:0 6px 18px rgba(0,0,0,0.4);
transition:0.2s;
animation:fadeUp 1.2s ease;
-webkit-tap-highlight-color: transparent;
}

.btn:hover{
transform:scale(1.05);
opacity:0.9;
}

/* animasi sentuh */
.btn:active{
transform:scale(0.95);
}

</style>

</head>

<body>

<div class="overlay">

<img class="profile" src="https://gcdnb.pbrd.co/images/v4H5IDcj65Ox.jpg?o=1">

<h1>ZEL ADMIN</h1>

<a class="btn" href="https://wa.me/62895402362957?text=sv%20zel%20admin">
Chat WhatsApp
</a>

<a class="btn" href="https://tiktok.com/@ichiiparthama" target="_blank">
TikTok
</a>

<a class="btn" href="https://www.instagram.com/ichiiprathama" target="_blank">
Instagram
</a>

</div>

</body>
</html>
